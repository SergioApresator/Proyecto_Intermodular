<div *ngIf="cargando" class="contenedor-cargando">
  <p>Cargando...</p>
</div>

<div *ngIf="!cargando" class="contenedor">
  <h2 class="titulo">{{ titulo }}</h2>
  <div class="cuadricula">
    <div *ngFor="let juego of juegos" class="tarjeta">
      <img [src]="juego.background_image" [alt]="juego.name" class="tarjeta-imagen">
      <div class="tarjeta-info">
        <p class="tarjeta-nombre">{{ juego.name }}</p>
        <p class="tarjeta-rating" *ngIf="genero !== 'proximos'">{{ juego.rating }} / 5</p>
        <p class="tarjeta-rating" *ngIf="genero === 'proximos'">Fecha: {{ juego.released }}</p>
      </div>
    </div>
  </div>

  <div class="contenedor-boton">
    <button *ngIf="hayMas" class="btn-cargar-mas" (click)="cargarMas()" [disabled]="cargandoMas">
      {{ cargandoMas ? 'Cargando...' : 'Cargar más' }}
    </button>
    <button class="btn-volver" routerLink="/inicial">Volver al inicio</button>
  </div>
</div>
