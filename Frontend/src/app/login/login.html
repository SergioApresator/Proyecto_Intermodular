<form [formGroup]="formularioLogin" (ngSubmit)="submit()"> 
<h1>Iniciar Sesión</h1>

    <p>Nombre de Usuario o Correo Electrónico: 
        <input type="text" formControlName="identity">
        @if(this.formularioLogin.get('identity')?.errors?.['required']) { 
            <span>(Obligatorio, no dejar vacío)</span> 
        } 
    </p>     

    <p>Contraseña: 
        <input type="text" formControlName="password">
        @if(this.formularioLogin.get('password')?.errors?.['required']) { 
            <span>(Obligatorio, no dejar vacío)</span> 
        } 
    </p> 
    <button type="submit" [disabled]="formularioLogin.invalid">Confirmar</button> 

</form>
