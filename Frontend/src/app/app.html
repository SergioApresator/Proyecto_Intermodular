<div class="navbar">
  <img src="assets/logo-clean.png" alt="Logo Gaming" class="navbar-logo">

  <div class="nav-links">
    <a routerLink="/inicial" routerLinkActive="active-link"><span>Página Inicial</span></a>
    <a routerLink="/busqueda" routerLinkActive="active-link"><span>Explorar</span></a>
    <a routerLink="/acerca-de" routerLinkActive="active-link"><span>Acerca de</span></a>

    <ng-container *ngIf="!estaLogueado">
      <a routerLink="/registro" routerLinkActive="active-link"><span>Registrarse</span></a>
      <a routerLink="/login" routerLinkActive="active-link"><span>Iniciar Sesión</span></a>
    </ng-container>
    <ng-container *ngIf="estaLogueado && esAdmin">
      <a routerLink="/admin" routerLinkActive="active-link"><span>Admin</span></a>
    </ng-container>
</div>

<!-- Boton buscar usuarios -->
<a routerLink="/buscar-usuarios" class="btn-buscar-usuarios" title="Buscar usuarios">

    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
        <circle cx="9" cy="7" r="4"></circle>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
    </svg>
</a>

  <div class="buscador-global">
    <input *ngIf="mostrarBuscador" type="text" class="input-global" placeholder="Buscar..."
      [(ngModel)]="terminoBusqueda" (keyup.enter)="buscarGlobal()">
    <button class="icono-lupa" (click)="toggleBuscador()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
    </button>
  </div>

  <!-- Menú de usuario estilo tarjeta de jugador -->
  <div class="user-menu-ow" *ngIf="estaLogueado">
    
    <!-- Foto de perfil grande (hacer clic) -->
    <div (click)="onAvatarClick($event)" class="avatar-container-ow" [class.no-photo]="!fotoUrl" style="cursor: pointer;">
      <img *ngIf="fotoUrl" [src]="fotoUrl" alt="Foto de perfil" class="avatar-img-ow">
      <div *ngIf="!fotoUrl" class="avatar-initials-ow">{{ getInitials() }}</div>
    </div>
 
    <!-- Desplegable Player Card (se muestra al hacer hover / clase activa en móvil) -->
    <div class="player-card-ow" [class.active-ow]="mostrarDropdown">
      <div class="player-card-header">
        
        <!-- Fondo del banner -->
        <div *ngIf="bannerUrl" class="card-banner-img" [style.backgroundImage]="'url(' + bannerUrl + ')'"></div>
        <div class="card-banner-overlay"></div>

        <div class="card-header-content">
          <div class="card-avatar-mini" [class.no-photo]="!fotoUrl">
            <img *ngIf="fotoUrl" [src]="fotoUrl" alt="Mini foto" class="avatar-img-ow">
            <div *ngIf="!fotoUrl" class="avatar-initials-ow sm">{{ getInitials() }}</div>
          </div>
          
          <div class="card-user-info">
            <div class="player-card-banner">
              <div class="banner-accent"></div>
              <span class="player-card-name">{{ username }}</span>
            </div>
            <div class="player-card-sub">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"></path></svg>
              <span>{{ username }} #{{ userId || '0000' }}</span>
            </div>
          </div>
        </div>
      </div>
      <div class="player-card-options">
        <div class="options-label">OPCIONES DE JUGADOR</div>
        <a class="card-item" routerLink="/perfil">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          <span>MI PERFIL</span>
        </a>

        <a class="card-item" routerLink="/diario">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          <span>MI DIARIO</span>
        </a>

        <button class="card-item logout" (click)="cerrarSesion()">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          <span>CERRAR SESIÓN</span>
        </button>
      </div>

    </div>

  </div>
</div>

<router-outlet />
