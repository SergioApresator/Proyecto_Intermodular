<div class="navbar">
  <img src="assets/logoGaming-removebg-preview.png" alt="Logo Gaming">

  <div class="nav-links">
    <a routerLink="/inicial" routerLinkActive="active-link">Página Inicial</a>
    <a routerLink="/diario" routerLinkActive="active-link">Diario</a>
    <a routerLink="/acerca-de" routerLinkActive="active-link">Acerca de</a>
    <ng-container *ngIf="!estaLogueado">
      <a routerLink="/registro" routerLinkActive="active-link">Registrarse</a>
      <a routerLink="/login" routerLinkActive="active-link">Iniciar Sesión</a>
    </ng-container>
  </div>

  <div class="buscador-global">
    <input *ngIf="mostrarBuscador" type="text" class="input-global" placeholder="Buscar..."
      [(ngModel)]="terminoBusqueda" (keyup.enter)="buscarGlobal()">
    <button class="icono-lupa" (click)="toggleBuscador()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
    </button>
  </div>

  <!-- User menu (shown when logged in) -->
  <div class="user-menu" *ngIf="estaLogueado" (click)="toggleDropdown()">
    <div class="avatar-wrapper">
      <img *ngIf="fotoUrl" [src]="fotoUrl" alt="Foto de perfil" class="avatar-img">
      <div *ngIf="!fotoUrl" class="avatar-initials">{{ getInitials() }}</div>
    </div>
    <span class="username-label">{{ username }}</span>
    <svg class="chevron" [class.rotated]="mostrarDropdown" xmlns="http://www.w3.org/2000/svg" width="14" height="14"
      viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"></polyline>
    </svg>

    <!-- Dropdown -->
    <div class="dropdown-menu" *ngIf="mostrarDropdown" (click)="$event.stopPropagation()">
      <div class="dropdown-header">
        <div class="avatar-wrapper sm">
          <img *ngIf="fotoUrl" [src]="fotoUrl" alt="Foto de perfil" class="avatar-img">
          <div *ngIf="!fotoUrl" class="avatar-initials">{{ getInitials() }}</div>
        </div>
        <div class="dropdown-user-info">
          <span class="dropdown-username">{{ username }}</span>
        </div>
      </div>
      <hr class="dropdown-divider">
      <a class="dropdown-item perfil-item" routerLink="/perfil" (click)="mostrarDropdown = false" id="link-mi-perfil">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        Mi perfil
      </a>
      <hr class="dropdown-divider">
      <button class="dropdown-item logout-item" (click)="cerrarSesion()">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        Cerrar sesión
      </button>
    </div>

  </div>
</div>

<router-outlet />
