<div class="navbar"> 
  <img src="assets/logoGaming-removebg-preview.png" alt="Logo Gaming">
  
  <div class="nav-links">
    <a routerLink="/inicial" routerLinkActive="active-link">Página Inicial</a> 
    <a routerLink="/registro" routerLinkActive="active-link">Registrarse</a> 
    <a routerLink="/login" routerLinkActive="active-link">Iniciar Sesión</a> 
  </div>

  <div class="buscador-global">
    <input *ngIf="mostrarBuscador" 
           type="text" 
           class="input-global" 
           placeholder="Buscar..." 
           [(ngModel)]="terminoBusqueda" 
           (keyup.enter)="buscarGlobal()">
    <button class="icono-lupa" (click)="toggleBuscador()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    </button>
  </div>

  <div class="perfil-btn" routerLink="/perfil">
    <img src="assets/avatar-default.png" alt="Perfil">
  </div>
  
</div>

<router-outlet />
