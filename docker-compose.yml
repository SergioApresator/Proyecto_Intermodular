services:
  db:
    image: mysql:8.0
    container_name: ratemygame-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ratemygame
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ratemygame-phpmyadmin
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: ratemygame-app
    ports:
      - "9999:9999"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/ratemygame?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./Backend/uploads:/app/uploads:z
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9999/api/games?size=1"]
      interval: 3s
      timeout: 3s
      retries: 20

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: ratemygame-frontend
    ports:
      - "4200:4000"
    depends_on:
      app:
        condition: service_healthy
    extra_hosts:
      - "localhost:host-gateway"
      - "host.docker.internal:host-gateway"

volumes:
  db-data:
